services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fake-news-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the SQLite path to a volume-backed location so data
      # survives container recreation.
      DATABASE_URL: sqlite:////app/backend/database/app.db
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and trained model artifacts across
      # container restarts/rebuilds.
      - backend_db:/app/backend/database
      - ml_models:/app/ml/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # Browser-facing URL — must be reachable from the user's
        # machine, not the Docker network, since this becomes a
        # compile-time constant in the built JS bundle.
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: fake-news-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_db:
  ml_models:
