server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets for faster load times.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively; index.html itself is
    # never cached so deploys take effect immediately on refresh.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any path that isn't a real file (e.g. /history,
    # /admin) falls back to index.html so React Router can handle it
    # client-side instead of Nginx returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
